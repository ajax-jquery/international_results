<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Live Match Stats</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .team-logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }
        .progress {
            height: 12px;
            border-radius: 8px;
            background-color: #e9ecef;
        }
        .card {
            border: none;
            border-radius: 12px;
        }
        .live-badge {
            font-weight: bold;
            color: #fff;
            background-color: #049800;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            font-size: 0.9rem;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        .stat-title {
            font-weight: 600;
            font-size: 0.9rem;
            color: #495057;
        }
        .nav-tabs .nav-link {
            cursor: pointer;
            color: #6c757d;
            font-weight: 500;
            border: none;
            border-bottom: 3px solid transparent;
        }
        .nav-tabs .nav-link.active {
            color: #0d6efd;
            background: transparent;
            border-bottom: 3px solid #0d6efd;
        }
        .nav-tabs .nav-link:hover:not(.active) {
            border-bottom: 3px solid #dee2e6;
        }
    </style>
</head>
<body>

<div class="container py-5">
    
    <!-- Setup Card: Input Match ID -->
    <div class="row justify-content-center mb-4">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h5 class="card-title mb-3">Track Live Match</h5>
                    <form id="setupForm" class="row g-2 align-items-center">
                        <div class="col-md-8">
                            <input type="url" class="form-control form-control-lg" id="matchIdInput" placeholder="https://www.fotmob.com/matches/france-vs-england/1wwwhw#4653857" required>
                        </div>
                        <div class="col-md-4 d-grid gap-2 d-md-flex">
                            <button type="submit" class="btn btn-primary btn-lg w-100" id="startBtn">Start</button>
                            <button type="button" class="btn btn-outline-danger btn-lg w-100 d-none" id="resetBtn">Reset</button>
                        </div>
                    </form>
                    <div id="errorMsg" class="text-danger mt-2 d-none small">Failed to load match. Please check the Match ID.</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Match Stats Card (Hidden by default) -->
    <div class="row justify-content-center" id="matchContainer" style="display: none;">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-body p-4">
                    
                    <!-- Header (Teams & Score) -->
                    <div class="row align-items-center mb-3">
                        <div class="col-4 text-center" id="homeTeam"></div>
                        <div class="col-4 text-center">
                            <h1 id="score" class="fw-bold display-5 mb-1">-</h1>
                            <div id="liveTime" class="live-badge">--</div>
                        </div>
                        <div class="col-4 text-center" id="awayTeam"></div>
                    </div>
                    
                    <hr class="text-muted">
                    
                    <!-- Tabs -->
                    <ul class="nav nav-tabs justify-content-center mb-4" id="tabs"></ul>
                    
                    <!-- Stats Content -->
                    <div id="stats" class="px-2"></div>
                    
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentMatchId = null;
    let categories = [];
    let currentTab = Number(localStorage.getItem("currentTab")) || 0;
    let timerInterval;
    let pollInterval,INTERVAL=null;
    let liveSeconds = 0;
    
    // Variabel untuk menyimpan status Wake Lock
    let wakeLock = null;

    const API = (id) => `https://www.fotmob.com/api/data/matchDetails?matchId=${id}&timestampt=${Date.now()}`;

    // DOM Elements
    const setupForm = document.getElementById('setupForm');
    const matchIdInput = document.getElementById('matchIdInput');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const matchContainer = document.getElementById('matchContainer');
    const errorMsg = document.getElementById('errorMsg');
    const tabs = document.getElementById('tabs');
    const stats = document.getElementById('stats');

    // --- FUNGSI WAKE LOCK (AGAR LAYAR TETAP ON) ---
    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
                console.log('Screen Wake Lock diaktifkan. Layar tidak akan mati.');
            }
        } catch (err) {
            console.error(`Wake Lock Error: ${err.name}, ${err.message}`);
        }
    }

    function releaseWakeLock() {
        if (wakeLock !== null) {
            wakeLock.release().then(() => {
                wakeLock = null;
                console.log('Screen Wake Lock dilepas. Layar bisa mati normal.');
            });
        }
    }

    // Jika tab pindah ke background lalu kembali, browser otomatis melepas Wake Lock.
    // Kode ini akan mengaktifkannya kembali jika statusnya sedang berjalan (currentMatchId ada).
    document.addEventListener('visibilitychange', async () => {
        if (wakeLock !== null && document.visibilityState === 'visible' && currentMatchId) {
            await requestWakeLock();
        }
    });
    // ----------------------------------------------

    // Handle Start Button
    setupForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const id = matchIdInput.value.trim().split("#")[1];
        if (!id) return;

        currentMatchId = id;
        
        // UI Changes
        matchIdInput.disabled = true;
        startBtn.classList.add('d-none');
        resetBtn.classList.remove('d-none');
        errorMsg.classList.add('d-none');

        // Minta layar untuk tetap menyala
        requestWakeLock();

        // Start Tracking
        startTracking();
    });

    // Handle Reset Button
    resetBtn.addEventListener('click', () => {
        stopTracking();
        
        // Lepas kuncian layar agar bisa mati kembali
        releaseWakeLock();
        
        currentMatchId = null;
        matchIdInput.disabled = false;
        startBtn.classList.remove('d-none');
        resetBtn.classList.add('d-none');
        matchContainer.style.display = 'none';
        errorMsg.classList.add('d-none');
    });

    async function load() {
        if (!currentMatchId) return;
        try {
            const res = await fetch(API(currentMatchId));
            if (!res.ok) throw new Error("Network response was not ok");
            
            const json = await res.json();
            
            // Show container if hidden
            if (matchContainer.style.display === 'none' && INTERVAL) {
                matchContainer.style.display = 'flex';
            }

            renderHeader(json);
            
            // Safety check in case stats don't exist yet
            if(json.content?.stats?.Periods?.All?.stats) {
                categories = json.content.stats.Periods.All.stats;
                renderTabs();
                renderCategory(currentTab >= categories.length ? 0 : currentTab);
            }
           if(INTERVAL)setTimeout(load,500);
        } catch(e) {
            console.error(e);
            errorMsg.classList.remove('d-none');
            stopTracking();
            releaseWakeLock(); // Lepas wake lock jika gagal load
            matchIdInput.disabled = false;
            startBtn.classList.remove('d-none');
            resetBtn.classList.add('d-none');
        }
    }
function name(params) {
  
}
    function startTracking() {
        load(); // Initial load
        pollInterval = setInterval(name, 10000);
        INTERVAL=true;
    }

    function stopTracking() {
        clearInterval(pollInterval);
        INTERVAL=null;
        clearInterval(timerInterval);
    }

    function renderHeader(json) {
        if(!json.header?.teams) return;
        
        const home = json.header.teams[0];
        const away = json.header.teams[1];

        document.getElementById('homeTeam').innerHTML = `
            <img src="${home.imageUrl}" class="team-logo mb-2 rounded-circle shadow-sm">
            <h6 class="mb-0 fw-bold">${home.name}</h6>
        `;

        document.getElementById('awayTeam').innerHTML = `
            <img src="${away.imageUrl}" class="team-logo mb-2 rounded-circle shadow-sm">
            <h6 class="mb-0 fw-bold">${away.name}</h6>
        `;

        document.getElementById('score').textContent = json.header.status.scoreStr || '-';
        
        if(json.header.status.liveTime?.long) {
            startClock(json.header.status.liveTime.long);
        } else {
            document.getElementById('liveTime').textContent = json.header.status.started ? "Finished" : "Not Started";
            document.getElementById('liveTime').classList.remove('live-badge');
            document.getElementById('liveTime').classList.add('badge', 'bg-secondary');
        }
    }

    function startClock(serverTime) {
        clearInterval(timerInterval);
        const p = serverTime.split(":");
        liveSeconds = (Number(p[0]) * 60) + Number(p[1]);
        if(liveSeconds){
          updateClock();
        }else{
           document.getElementById('liveTime').textContent =serverTime
        }
        timerInterval = setInterval(() => {
            liveSeconds++;
            if(liveSeconds){
          updateClock();
        }else{
           document.getElementById('liveTime').textContent =serverTime
        }
        }, 1000);
    }

    function updateClock() {
        const m = Math.floor(liveSeconds / 60);
        const s = liveSeconds % 60;
         if (m && s)document.getElementById('liveTime').textContent = `${m}:${String(s).padStart(2, "0")}'`;
    }

    function renderTabs() {
        tabs.innerHTML = "";
        categories.forEach((cat, i) => {
            tabs.innerHTML += `
            <li class="nav-item">
                <button class="nav-link ${i === currentTab ? 'active' : ''}" onclick="renderCategory(${i})">
                    ${cat.title}
                </button>
            </li>`;
        });
    }

    window.renderCategory = function(index) {
        if (!categories[index]) return;
        currentTab = index;
        localStorage.setItem("currentTab", index);

        document.querySelectorAll(".nav-link").forEach((e, i) => {
            e.classList.toggle("active", i === index);
        });

        const cat = categories[index];
        let html = "";

        cat.stats.forEach(stat => {
            if (stat.type === "title") return;

            const homeStr = stat.stats[0] ?? "-";
            const awayStr = stat.stats[1] ?? "-";

            let h = parseFloat(homeStr);
            let a = parseFloat(awayStr);

            if (isNaN(h)) h = 0;
            if (isNaN(a)) a = 0;

            let total = h + a;
            let left = 50;
            let right = 50;

            if (total > 0) {
                left = (h / total) * 100;
                right = 100 - left;
            } else if (h === 0 && a === 0) {
                left = 0; 
                right = 0;
            }

            html += `
            <div class="mb-3">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <div class="fw-bold fs-6">${homeStr}</div>
                    <div class="stat-title text-center text-uppercase" style="font-size: 0.75rem; letter-spacing: 0.5px;">
                        ${stat.title}
                    </div>
                    <div class="fw-bold fs-6">${awayStr}</div>
                </div>
                <div class="progress">
                    <div class="progress-bar" style="width: ${left}%; background-color: #0d6efd;"></div>
                    <div class="progress-bar" style="width: ${right}%; background-color: #dc3545;"></div>
                </div>
            </div>`;
        });

        stats.innerHTML = html;
    }
</script>
</body>
</html>
