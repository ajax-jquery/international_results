<!doctype html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Live Match Stats</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f3f5f7;
}

.team-logo{
    width:70px;
}

.progress{
    height:14px;
}

.card{
    border:none;
}

.live{
    font-weight:bold;
    color:#dc3545;
}

.stat-title{
    font-weight:600;
    font-size:.95rem;
}

.nav-link{
    cursor:pointer;
}

</style>

</head>

<body>

<div class="container py-4">

<div class="card shadow">

<div class="card-body">

<div class="row align-items-center">

<div class="col text-center" id="homeTeam"></div>

<div class="col-3 text-center">

<h2 id="score">-</h2>

<div id="liveTime" class="live fs-5">
--
</div>

</div>

<div class="col text-center" id="awayTeam"></div>

</div>

<hr>

<ul class="nav nav-tabs mb-4" id="tabs"></ul>

<div id="stats"></div>

</div>

</div>

</div>

<script>

const MATCH_ID = 4653853;

const API = () =>
`https://www.fotmob.com/api/data/matchDetails?matchId=${MATCH_ID}&timestampt=${Date.now()}`;

let categories=[];

let currentTab=Number(localStorage.getItem("currentTab"))||0;

let timerInterval;

let liveSeconds=0;

async function load(){

    try{

        const res=await fetch(API());

        const json=await res.json();

        renderHeader(json);

        categories=json.content.stats.Periods.All.stats;

        renderTabs();

        renderCategory(currentTab);

    }

    catch(e){

        console.error(e);

    }

}

function renderHeader(json){

    const home=json.header.teams[0];
    const away=json.header.teams[1];

    homeTeam.innerHTML=`
        <img src="${home.imageUrl}" class="team-logo mb-2">
        <h5>${home.name}</h5>
    `;

    awayTeam.innerHTML=`
        <img src="${away.imageUrl}" class="team-logo mb-2">
        <h5>${away.name}</h5>
    `;

    score.textContent=json.header.status.scoreStr;

    startClock(json.header.status.liveTime.long);

}

function startClock(serverTime){

    clearInterval(timerInterval);

    const p=serverTime.split(":");

    liveSeconds=(Number(p[0])*60)+Number(p[1]);

    updateClock();

    timerInterval=setInterval(()=>{

        liveSeconds++;

        updateClock();

    },1000);

}

function updateClock(){

    const m=Math.floor(liveSeconds/60);

    const s=liveSeconds%60;

    liveTime.textContent=
        `${m}:${String(s).padStart(2,"0")}'`;

}

function renderTabs(){

    tabs.innerHTML="";

    categories.forEach((cat,i)=>{

        tabs.innerHTML+=`
        <li class="nav-item">

        <button
        class="nav-link ${i===currentTab?'active':''}"
        onclick="renderCategory(${i})">

        ${cat.title}

        </button>

        </li>
        `;

    });

}

function renderCategory(index){

    currentTab=index;

    localStorage.setItem("currentTab",index);

    document
    .querySelectorAll(".nav-link")
    .forEach((e,i)=>{

        e.classList.toggle("active",i===index);

    });

    const cat=categories[index];

    let html="";

    cat.stats.forEach(stat=>{

        if(stat.type==="title") return;

        const home=stat.stats[0]??"-";
        const away=stat.stats[1]??"-";

        let h=parseFloat(home);

        let a=parseFloat(away);

        if(isNaN(h)) h=0;
        if(isNaN(a)) a=0;

        let total=h+a;

        let left=50;

        let right=50;

        if(total>0){

            left=(h/total)*100;

            right=100-left;

        }

        html+=`

<div class="mb-4">

<div class="d-flex justify-content-between mb-1">

<div><strong>${home}</strong></div>

<div class="stat-title">
${stat.title}
</div>

<div><strong>${away}</strong></div>

</div>

<div class="progress">

<div
class="progress-bar bg-primary"
style="width:${left}%">
</div>

<div
class="progress-bar bg-danger"
style="width:${right}%">
</div>

</div>

</div>

`;

    });

    stats.innerHTML=html;

}

load();

setInterval(load,1000);

</script>

</body>

</html>
